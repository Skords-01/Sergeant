name: Mobile Shell (iOS)

# iOS build-only lane for the Capacitor shell in `apps/mobile-shell/**`.
# Proves the shell still compiles on an Apple toolchain every PR.
# No signing, no TestFlight, no device deployment — a simulator build
# is enough to catch Pod / Swift / Capacitor plugin breakage early.
#
# Pipeline:
#   1. `pnpm build:web`              — Vite bundle into `apps/server/dist`
#   2. `cap add ios`                 — scaffold `apps/mobile-shell/ios` +
#                                       `pod install` (ios/ is intentionally
#                                       uncommitted; see apps/mobile-shell/README.md)
#   3. `cap sync ios`                — copy assets + refresh plugin graph
#   4. `xcodebuild ... build`        — build App scheme for iOS Simulator
#                                       with CODE_SIGNING_ALLOWED=NO
#
# The job intentionally runs on `macos-latest` (billed ≈10× Linux) and is
# path-filtered to mobile-shell / web surfaces so web-only PRs don't pay
# for a macOS runner they do not need.

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile-shell/**"
      - "apps/web/**"
      - "apps/server/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".github/workflows/mobile-shell-ios.yml"
  pull_request:
    paths:
      - "apps/mobile-shell/**"
      - "apps/web/**"
      - "apps/server/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".github/workflows/mobile-shell-ios.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-shell-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios-debug:
    name: Build iOS Simulator (Debug)
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      # actions/checkout v4.3.1 (SHA-pinned)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # pnpm/action-setup v4.1.0 (SHA-pinned)
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2

      # actions/setup-node v4.4.0 (SHA-pinned)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build web bundle
        run: pnpm build:web

      - name: Scaffold iOS project (cap add ios)
        # `ios/` is intentionally uncommitted in the repo — see the
        # "iOS" section of apps/mobile-shell/README.md. `cap add ios`
        # first scaffolds the Xcode project and _then_ runs `pod install`.
        # The pod install step fails on the default template because
        # @capacitor-mlkit/barcode-scanning 7.5 → GoogleMLKit 7.0 needs
        # iOS ≥ 15.5 while the template ships `platform :ios, '14.0'`.
        # The Xcode project + Podfile are already on disk at that point
        # though, so we swallow the exit code, patch the Podfile, and
        # run `pod install` ourselves in the next step via `cap sync ios`.
        working-directory: apps/mobile-shell
        run: pnpm exec cap add ios || true

      - name: Raise iOS deployment target in Podfile
        working-directory: apps/mobile-shell/ios/App
        # Bump `platform :ios, 'X'` from the Capacitor template default to
        # 15.5 so `pod install` can resolve GoogleMLKit/BarcodeScanning
        # 7.0.0 (the transitive dep of @capacitor-mlkit/barcode-scanning).
        run: |
          test -f Podfile || { echo "Podfile missing — cap add ios did not scaffold"; exit 1; }
          sed -i.bak "s/^platform :ios, '[0-9.]*'/platform :ios, '15.5'/" Podfile
          diff -u Podfile.bak Podfile || true
          rm Podfile.bak

      - name: Capacitor sync (ios)
        working-directory: apps/mobile-shell
        # `cap sync ios` now runs `pod install` against the patched
        # Podfile and refreshes the plugin graph / web assets.
        run: pnpm exec cap sync ios

      - name: Build App scheme for iOS Simulator (no signing)
        working-directory: apps/mobile-shell/ios/App
        # NSBuildDesktopApp: xcodebuild needs an explicit -destination when
        # the scheme has multiple supported platforms. `generic/platform=iOS
        # Simulator` avoids picking a specific simulator OS version that the
        # runner image may not have cached.
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build
