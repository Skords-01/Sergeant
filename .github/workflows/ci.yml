name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Turborepo remote cache — speeds up turbo tasks across CI runs.
  # Secrets are configured in the repo's GitHub settings; when absent
  # turbo silently falls back to local-only caching (no CI breakage).
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  commitlint:
    name: Commit messages (commitlint)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4.3.1 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      # pnpm/action-setup v4.1.0 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2

      # actions/setup-node v4.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate PR commit messages
        run: pnpm exec commitlint --from "origin/${{ github.base_ref }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

  check:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4.3.1 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # pnpm/action-setup v4.1.0 (SHA-pinned for supply-chain hardening)
      # Version is read from packageManager in root package.json.
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2

      # actions/setup-node v4.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Audit (critical only)
        run: pnpm audit --audit-level=critical --prod

      - name: Audit (high, production)
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'audit-exception') }}
        run: pnpm audit --audit-level=high --prod

      - name: Audit full tree (high)
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'audit-exception') }}
        run: pnpm audit --audit-level=high

      - name: License policy check (production tree)
        # Validates that every package in the production dependency
        # tree of @sergeant/web + @sergeant/server carries an allowed
        # licence AND that THIRD_PARTY_LICENSES.md reflects the current
        # lockfile. The previous root-level license-checker invocation
        # became a silent no-op after the pnpm-workspace migration —
        # see #516 and scripts/generate-licenses.mjs for the new
        # pipeline (licence allowlist lives in that script so policy
        # changes sit next to the generator they govern).
        run: pnpm licenses:check

      - name: Format, lint, test, build
        run: pnpm check

      - name: Bundle size guard (size-limit)
        run: pnpm --filter @sergeant/web exec size-limit

  coverage:
    name: Test coverage (vitest)
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4.3.1 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # pnpm/action-setup v4.1.0 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2

      # actions/setup-node v4.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run vitest with coverage
        # apps/server and apps/web enforce per-package floor thresholds in
        # their vitest.config files (~2pp below baseline). A drop below the
        # floor fails this job. Domain packages are already near 100%, so
        # they don't carry explicit floors yet.
        run: pnpm test:coverage

      - name: Upload coverage HTML reports
        if: always()
        # actions/upload-artifact v4.4.3 (SHA-pinned)
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: vitest-coverage-html
          path: |
            apps/server/coverage
            apps/web/coverage
            apps/mobile-shell/coverage
            packages/*/coverage
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload coverage JSON summaries
        if: always()
        # actions/upload-artifact v4.4.3 (SHA-pinned)
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: vitest-coverage-summary
          path: |
            apps/server/coverage/coverage-summary.json
            apps/web/coverage/coverage-summary.json
            apps/mobile-shell/coverage/coverage-summary.json
            packages/*/coverage/coverage-summary.json
          if-no-files-found: ignore
          retention-days: 30

  a11y:
    name: Accessibility (axe-core)
    runs-on: ubuntu-latest
    needs: check
    steps:
      # actions/checkout v4.3.1 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # pnpm/action-setup v4.1.0 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2

      # actions/setup-node v4.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @sergeant/web exec playwright install --with-deps chromium

      - name: Run axe accessibility checks
        run: pnpm test:a11y
        env:
          CI: "true"

      - name: Upload Playwright report
        if: always()
        # actions/upload-artifact v4.4.3 (SHA-pinned)
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: playwright-a11y-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7

  smoke-e2e:
    name: Smoke E2E (Playwright)
    runs-on: ubuntu-latest
    # No `needs:` — runs in parallel with other jobs so a lint/test failure in
    # `check` never causes this job to be skipped.  Previously `needs: check`
    # was the root cause of the job being skipped on most PRs.
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
        env:
          POSTGRES_USER: hub
          POSTGRES_PASSWORD: hub
          POSTGRES_DB: hub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hub -d hub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://hub:hub@127.0.0.1:5432/hub
      BETTER_AUTH_SECRET: smoke_test_better_auth_secret_32_chars_min
      AI_QUOTA_DISABLED: "1"
      VITE_API_BASE_URL: http://127.0.0.1:3000
      ALLOWED_ORIGINS: http://127.0.0.1:4173

    steps:
      # actions/checkout v4.3.1 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # pnpm/action-setup v4.1.0 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2

      # actions/setup-node v4.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pnpm --filter @sergeant/web exec playwright --version | head -1)" >> "$GITHUB_OUTPUT"

      # actions/cache v4.2.3 (SHA-pinned for supply-chain hardening)
      - name: Cache Playwright browsers
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @sergeant/web exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cached browsers)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @sergeant/web exec playwright install-deps chromium

      - name: Run database migrations
        run: pnpm --filter @sergeant/server db:migrate:dev

      - name: Build web app
        run: pnpm --filter @sergeant/web build

      - name: Start API server
        run: pnpm --filter @sergeant/server dev &

      - name: Start Vite preview server
        run: pnpm --filter @sergeant/web preview -- --port 4173 --host 127.0.0.1 &

      - name: Wait for servers
        run: |
          echo "Waiting for API server on :3000…"
          timeout 60 bash -c 'until curl -sf http://127.0.0.1:3000/health >/dev/null 2>&1; do sleep 2; done'
          echo "Waiting for preview server on :4173…"
          timeout 60 bash -c 'until curl -sf http://127.0.0.1:4173 >/dev/null 2>&1; do sleep 2; done'
          echo "Both servers ready."

      - name: Run smoke E2E suite
        run: pnpm --filter @sergeant/web exec playwright test -c playwright.smoke.config.ts
        env:
          CI: "true"
          PW_SKIP_WEBSERVER: "1"
          PW_BASE_URL: http://127.0.0.1:4173

      - name: Upload Playwright report
        if: always()
        # actions/upload-artifact v4.4.3 (SHA-pinned)
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: playwright-smoke-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7

  migration-lint:
    name: Migration lint (AGENTS rule #4)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      # actions/checkout v4.3.1 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      # actions/setup-node v4.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Lint migration files
        run: node scripts/lint-migrations.mjs
        env:
          BASE_REF: ${{ github.base_ref }}

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # actions/checkout v4.3.1 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      # gitleaks/gitleaks-action v2.3.9 (SHA-pinned for supply-chain hardening)
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
