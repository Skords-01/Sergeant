name: Detox (Android)

# Mobile E2E lane for the Android Detox suites in `apps/mobile/e2e/*`.
# Separate from the main `CI` workflow in `.github/workflows/ci.yml`
# because:
#   - An AVD boot + `gradle assembleDebug` + `assembleAndroidTest` pipeline
#     takes ≥10 min on `ubuntu-latest` with KVM enabled, so we only run
#     it on `main` / mobile-scoped PRs.
#   - A failing Detox run should not block an unrelated web-only PR.
#
# iOS CI is configured in the sibling `.github/workflows/detox-ios.yml` —
# they share the same suite set (`apps/mobile/e2e/*.e2e.ts`) and the
# same `pnpm e2e:*` entry points.
#
# The emulator is driven by `reactivecircus/android-emulator-runner@v2`
# (SHA-pinned below). Rationale for this action over a hand-rolled
# `sdkmanager` + `emulator` invocation: it ships the KVM setup (`sudo
# chmod 666 /dev/kvm`), AVD cache keying, and headless GPU flags
# already battle-tested by the React Native community.

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/finyk-domain/**"
      - "packages/routine-domain/**"
      - "packages/api-client/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/detox-android.yml"
  pull_request:
    paths:
      - "apps/mobile/**"
      - "packages/finyk-domain/**"
      - "packages/routine-domain/**"
      - "packages/api-client/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/detox-android.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: detox-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detox-android:
    # Must be a Linux runner with nested virtualisation — ubuntu-latest
    # currently enables KVM on the default image. macOS would work too
    # but it is 10× the cost of Linux, so stay here unless the AVD
    # stack regresses.
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      EXPO_PUBLIC_E2E: "1"
      E2E_BUILD: "1"
      # Keep Gradle's daemon off so artefacts / memory don't leak
      # between the `assembleDebug` and `assembleAndroidTest` passes
      # that Detox triggers via `pnpm e2e:build:android`.
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"
    # Pixel_5_API_34 mirrors the Detox `devices.emulator` avdName in
    # `apps/mobile/.detoxrc.js`, so contributors who run Detox locally
    # against the same AVD see identical behaviour.
    strategy:
      matrix:
        api-level: [34]
    steps:
      # actions/checkout v4.3.1 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # Enable hardware acceleration for the x86_64 emulator.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # pnpm/action-setup v4.1.0 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2

      # actions/setup-node v4.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: pnpm

      # actions/setup-java v4.7.1 — required for the Gradle wrapper
      # shipped by `expo prebuild` (Android Gradle Plugin needs JDK 17+).
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00
        with:
          distribution: temurin
          java-version: "17"

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # Detox drives the APK produced by `expo prebuild` + `gradle
      # assembleDebug/assembleAndroidTest`. `--platform android` keeps
      # the iOS projects out of the workspace so this job does not
      # generate a dangling `ios/` tree.
      - name: Prebuild Android project
        working-directory: apps/mobile
        run: pnpm exec expo prebuild --platform android --clean --non-interactive

      # Cache the Gradle dependency graph so follow-up runs skip the
      # Android dependency resolution pass (~2–3 min).
      - name: Cache Gradle
        # actions/cache v4.2.0 (SHA-pinned for supply-chain hardening)
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # The `android-emulator-runner` action exposes an AVD snapshot cache
      # step so cold-boot times drop from ~2 min to ~30 s on cache hit.
      - name: AVD cache
        # actions/cache v4.2.0 (SHA-pinned for supply-chain hardening)
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-google_apis

      - name: Create AVD + snapshot cache
        if: steps.avd-cache.outputs.cache-hit != 'true'
        # reactivecircus/android-emulator-runner v2.33.0 (SHA-pinned)
        uses: reactivecircus/android-emulator-runner@62dbb605bba737720e10b196cb4220d374026a6d
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "AVD snapshot generated"

      - name: Build Detox Android app
        working-directory: apps/mobile
        run: pnpm e2e:build:android

      - name: Run Detox Android suite
        # reactivecircus/android-emulator-runner v2.33.0 (SHA-pinned)
        uses: reactivecircus/android-emulator-runner@62dbb605bba737720e10b196cb4220d374026a6d
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          working-directory: apps/mobile
          script: pnpm e2e:test:android -- --headless --record-logs all

      - name: Upload Detox artefacts on failure
        if: always()
        # actions/upload-artifact v4.4.3 (SHA-pinned for supply-chain hardening)
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: detox-android-artifacts
          path: apps/mobile/.detox-artifacts
          if-no-files-found: ignore
